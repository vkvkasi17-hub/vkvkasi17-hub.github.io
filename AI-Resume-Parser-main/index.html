<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Parser | Interactive</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="nav-content">
            <div class="logo">Neural<span>Parse</span></div>
            <div class="badge">AI Engine v2.0</div>
        </div>
    </nav>

    <div class="container">
        <header class="page-header">
            <h1>Smarter Resume <span>Insights</span></h1>
            <p>A colorful and interactive way to visualize professional data.</p>
        </header>

        <div class="upload-panel fade-in">
            <label class="upload-zone" id="drop-zone">
                <div class="upload-icon">🚀</div>
                <div id="file-name" class="file-name-text">Ready for your Resume</div>
                <div class="sub-text">Drag and drop or click to explore</div>
                <input type="file" id="file-input" accept=".pdf,.docx">
            </label>
            
            <button class="btn" id="submit-btn" disabled>
                <span id="btn-text">Parse Document</span>
                <div class="spinner" id="spinner" style="display: none;"></div>
            </button>
        </div>

        <div class="results-panel" id="results-panel" style="display: none;">
            
            <div class="contact-grid">
                <div class="card scroll-animate">
                    <div class="data-label">Email</div>
                    <div class="data-value" id="res-email" style="font-weight: 700;"></div>
                </div>
                <div class="card scroll-animate">
                    <div class="data-label">Phone</div>
                    <div class="data-value" id="res-phone" style="font-weight: 700;"></div>
                </div>
            </div>

            <div id="summary-container" class="card scroll-animate">
                <div class="data-label">Professional Profile</div>
                <div class="text-content" id="res-summary"></div>
            </div>

            <div class="card scroll-animate">
                <div class="data-label">Core Competencies</div>
                <div class="skills-grid" id="res-skills"></div>
            </div>

            <div id="res-experience"></div>
            <div id="dynamic-sections-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
